<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Found an Item – Firta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="item-page">

  
  <div id="loading-overlay">
    <div class="loading-inner">
      <div class="loading-logo">firta.</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  
  <main class="item-main page-fade">

   
    <div id="item-content">
      <div style="text-align:center;padding:80px 24px;color:var(--gray-500)">
        <div class="spinner spinner-dark" style="width:32px;height:32px;margin:0 auto 16px"></div>
        <p>Loading item information....</p>
      </div>
    </div>

   
    <div class="powered-by">
      Powered by <a href="index.html">Firta</a> — Smart Lost &amp; Found
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
